<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mecânica Rápida - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <div class="login-page">

    <div class="login-card">

      <img src="assets/logo.png" class="login-logo">

      <h1>Bem-vindo</h1>
      <p>Acesse o sistema da Mecânica Rápida</p>

      <div class="input-group">
        <span class="material-icons">badge</span>
        <input type="text" id="matricula" placeholder="Matrícula">
      </div>

      <div class="input-group">
        <span class="material-icons">lock</span>
        <input type="password" id="senha" placeholder="Senha">
      </div>

      <p class="link" onclick="irRecuperacao()">Esqueci minha senha</p>

      <button class="login-button" onclick="login()">Entrar</button>

    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
