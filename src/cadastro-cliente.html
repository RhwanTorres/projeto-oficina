<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Cliente</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <div class="container cadastro-container">

    <div class="top-actions">
      <button class="btn-voltar" onclick="irClientes()">
        <span class="material-icons">arrow_back</span>
      </button>

      <h2>Cadastro de Cliente</h2>
    </div>

    <header class="clientes-header">
      <img src="assets/logo.png" class="logo">
      <p>Preencha os dados do cliente e do veículo</p>
    </header>

    <section class="form-card">

      <div class="form-grid">

        <div class="input-group">
          <span class="material-icons">person</span>
          <input type="text" id="nomeCliente" placeholder="Nome do cliente">
        </div>

        <div class="input-group">
          <span class="material-icons">directions_car</span>
          <input type="text" id="placaCliente" placeholder="Placa do veículo">
        </div>

        <div class="input-group">
          <span class="material-icons">build</span>
          <input type="text" id="modeloCliente" placeholder="Modelo do veículo">
        </div>

        <div class="input-group">
          <span class="material-icons">phone</span>
          <input type="text" id="telefoneCliente" placeholder="Telefone">
        </div>

      </div>

      <button class="btn-principal" onclick="cadastrarCliente()">
        Cadastrar Cliente
      </button>

    </section>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
