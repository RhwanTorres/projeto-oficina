<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Clientes Cadastrados</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <div class="container lista-clientes-container">

    <div class="top-actions">
      <button class="btn-voltar" onclick="irClientes()">
        <span class="material-icons">arrow_back</span>
      </button>

      <h2>Clientes Cadastrados</h2>
    </div>

    <header class="clientes-header">
      <img src="assets/logo.png" class="logo">
      <p>Consulte os clientes e veículos registrados no sistema.</p>
    </header>

    <section class="tabela-card">

      <table class="tabela-clientes">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Placa</th>
            <th>Modelo</th>
            <th>Telefone</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>João Silva</td>
            <td>ABC-1234</td>
            <td>Fiat Uno</td>
            <td>(81) 99999-0000</td>
            <td><span class="status-ativo">Ativo</span></td>
          </tr>

          <tr>
            <td>Maria Souza</td>
            <td>PEF-2024</td>
            <td>Honda Civic</td>
            <td>(81) 98888-1111</td>
            <td><span class="status-ativo">Ativo</span></td>
          </tr>

          <tr>
            <td>Carlos Lima</td>
            <td>KLM-7788</td>
            <td>Gol</td>
            <td>(81) 97777-2222</td>
            <td><span class="status-pendente">Pendente</span></td>
          </tr>
        </tbody>
      </table>

    </section>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
