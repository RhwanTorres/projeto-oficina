<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mecânica Rápida - Perfil</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <div class="container perfil-container">

    <header class="perfil-header">
      <img src="assets/logo.png" class="logo">
      <h1>Perfil do Usuário</h1>
      <p>Informações da conta conectada ao sistema.</p>
    </header>

    <section class="perfil-card">

      <div class="perfil-avatar">
        <span class="material-icons">person</span>
      </div>

      <div class="perfil-info">
        <h2>Rhwan Torres</h2>
        <p>Administrador da Oficina</p>
      </div>

      <div class="perfil-dados">
        <div>
          <strong>Nome</strong>
          <span>Rhwan Torres</span>
        </div>

        <div>
          <strong>Email</strong>
          <span>rhwan@email.com</span>
        </div>

        <div>
          <strong>Perfil</strong>
          <span>Administrador</span>
        </div>

        <div>
          <strong>Status</strong>
          <span class="status-ativo">Ativo</span>
        </div>
      </div>

      <button onclick="irDashboard()">Voltar ao painel</button>

    </section>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
